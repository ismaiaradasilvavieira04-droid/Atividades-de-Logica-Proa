<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 4</title>
</head>
<body>
<script>

    let ipi = parseFloat(prompt("Qual é a porcentagem do IPI (%)?"));

  
    let valor1 = parseFloat(prompt("Digite o valor do produto 1 (R$):"));
    let quantidade1 = parseInt(prompt("Digite a quantidade do produto 1:"));

   
    let valor2 = parseFloat(prompt("Digite o valor do produto 2 (R$):"));
    let quantidade2 = parseInt(prompt("Digite a quantidade do produto 2:"));

  
    let total1 = (valor1 * quantidade1) * (ipi / 100 + 1);
    let total2 = (valor2 * quantidade2) * (ipi / 100 + 1);

    document.write("<h2>🧾 Resultado da compra</h2>");
    document.write("<br>Produto 1: R$ " + total1.toFixed(2));
    document.write("<br>Produto 2: R$ " + total2.toFixed(2));

</script>
</body>
</html>
