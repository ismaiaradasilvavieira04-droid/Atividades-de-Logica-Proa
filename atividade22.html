<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 22</title>
</head>
<body>
    <h1>Atividade 22</h1>
    <script>
         let numero1 = 0

        for(let i =1 ; i <= 20; i++){
           let numero = parseInt(prompt("digite um numero "))
            if (numero > 0 && numero < 100) {
                numero1++
            }
        }
        document.write(" <br> a quantidades de numeros entre 0 e 100 é: " + numero1)

    </script>
</body>
</html>
