<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <script>

       
        let media1 = (8 + 9 + 7) / 3;

       
        let media2 = (4 + 5 + 6) / 3;

        
        let somaMedias = media1 + media2;

       
        let mediaDasMedias = somaMedias / 2;

       
        document.write("Média 1: "+ media1)
        document.write("<br>Média 2: " + media2)
        document.write("<br>Soma das médias: " + somaMedias)
        document.write("<br>Média das médias: " + mediaDasMedias)

    </script>
    
</body>
</html>
