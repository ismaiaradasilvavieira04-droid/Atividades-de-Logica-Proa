<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 16</title>
</head>
<body>
    <h1>Atividade 16</h1>

    <script>
        let soma = 0;

        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt("Digite a idade: "));
            soma = soma + idade;
        }

        let media = soma / 20;

        document.write("<br> A média das idades é: " + media);
    </script>

</body>
</html>
