<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 6</title>
</head>

<body>
    <h1>atividade 6</h1>
    <script>
        let numero = parseInt(prompt("digite um numero"))
        document.write(" <br> o numero digitado é:" + numero)

        let antecessor = numero - 1
        document.write(" <br> o antecessor do numero é:" + antecessor)
        let sucessor = numero + 1
        
        document.write(" <br> o sucessor do numero é:" + sucessor)
    </script>

</body>

</html>
