<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 23</title>
</head>
<body>
    <h1>atividade 23</h1>
    <script>
        let numero1 = 0

        for(let i =1 ; i <= 20; i++){
           let numero = parseInt(prompt("digite um numero "))
            if (numero > 1 && numero < 100) {
                numero1++
            }else if (numero > 100 && numero < 200) {
                document.write(" <br> o numero " + numero + "  esta entre 101 e 200")
            }
        }
        document.write(" <br> a quantidades de numeros entre 1 e 100 é: " + numero1)
        document.write(" <br> a quantidades de numeros entre 101 e 200 é: " + (20 - numero1))
        
    </script>
</body>
</html>
