<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 19</title>
</head>
<body>
    <h1>Atividade 19</h1>

    <script>
        let cotacao = parseFloat(prompt("Qual o valor do dólar hoje?"));
        let dolares = parseFloat(prompt("Quantos dólares você tem?"));

        let reais = dolares * cotacao;

        document.write("<br> Você tem $" + dolares + " dólares.");
        document.write("<br> Com a cotação de R$ " + cotacao);
        document.write("<br> Isso dá aproximadamente R$ " + reais);
    </script>

</body>
</html>
