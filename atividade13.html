<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 13</title>
</head>
<body>
    <h1>atividade 13</h1>
    <script>
       let celcius = parseFloat(prompt("digite a temperatura em celcius"))
       document.write(" <br> a temperatura em celcius é :" + celcius)
         let fahrenheit = ( 9*celcius + 160) / 5
         document.write(" <br> a temperatura em fahrenheit é :" + fahrenheit.toFixed(1))
    </script>
</body>
</html>
