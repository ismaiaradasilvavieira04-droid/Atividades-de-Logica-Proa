<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <script>
       
        let anos = parseFloat(prompt("Digite sua idade: "))
        document.write("<br>A idade total em anos é de: "+ anos)
       

        let meses = anos * 12
        document.write("<br>A idade total em meses é de: "+ meses)
      
        
        let dias = anos * 365
        document.write("<br>A idade total em dias é de: "+ dias)
        
        

    </script>
    
</body>
</html>
