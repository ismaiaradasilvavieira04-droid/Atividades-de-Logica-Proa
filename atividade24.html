<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 24</title>
</head>
<body>
    <h1>Atividade 24</h1>
    <script>
        let soma = 0;
while(true) {
    let entrada = prompt("Digite um número (0 ou negativo para sair):");
    let numero = parseInt(entrada);

       

    if (numero < 0) {
        break;
    }

    
    soma += numero;
}

document.write("<br> A soma dos números é: " + soma);
    </script>
</body>
</html>
