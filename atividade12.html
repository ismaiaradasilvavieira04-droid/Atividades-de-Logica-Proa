<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>atividade  12</title>
</head>
<body>
    <h1>atividade 12</h1>

    <script>
        let soma = 0;

        for (let i = 1; i <= 15; i++) {
            soma += i;
        }

        document.write("A soma de 1 até 15 é: " + soma);
    </script>
</body>
