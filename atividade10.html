<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 10</title>
</head>
<body>
    <h1>Atividade 10</h1>
    <script>
        let saldo = parseFloat(prompt("digite o saldo da sua conta"))
        document.write(" <br> o saldo da sua conta é :" + saldo)

        let reajuste = saldo * 1.05
        document.write(" <br> o valor do reajuste é :" + reajuste.toFixed(2))
    </script>
</body>
</html>
