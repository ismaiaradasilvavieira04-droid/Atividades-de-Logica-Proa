<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 8</title>
</head>
<body>
    <h1>Atividade 8</h1>

    <script>
        let ipi = parseFloat(prompt("Digite o valor do IPI (%)"));
        document.write("<br> IPI: " + ipi + "%");

        let valor1 = parseFloat(prompt("Digite o valor da peça 1"));
        let qtd1 = parseInt(prompt("Digite a quantidade da peça 1"));
        document.write("<br> Peça 1 → Valor: " + valor1 + " | Quantidade: " + qtd1);

        let valor2 = parseFloat(prompt("Digite o valor da peça 2"));
        let qtd2 = parseInt(prompt("Digite a quantidade da peça 2"));
        document.write("<br> Peça 2 → Valor: " + valor2 + " | Quantidade: " + qtd2);

        let total = (valor1 * qtd1 + valor2 * qtd2) * (ipi / 100 + 1);

        document.write("<br><br> Valor total da compra: " + total);
    </script>
</body>
</html>
