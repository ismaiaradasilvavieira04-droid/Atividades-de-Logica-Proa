<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 4</title>
</head>
<body>
    <h1>Atividade 4</h1>

    <script>
        let soma = 0;
        let contador = 0;

        for (let n = 15; n <= 100; n++) {
            soma = soma + n;
            contador = contador + 1;
        }

        let media = soma / contador;

        document.write("<br> Média: " + media);
    </script>

</body>
</html>
