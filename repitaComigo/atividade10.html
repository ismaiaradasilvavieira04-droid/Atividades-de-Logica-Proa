<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 10</title>
</head>
<body>
    <h1>Atividade 10</h1>
    <script>
         let tabuada = parseInt(prompt("Digite o valor de N:"))

            for (let n= 1; n <= 10; n++) {
                document.write(tabuada + " x " + n + " = " + (tabuada * n) + "<br>")
            }
        
    </script>
</body>
</html>
