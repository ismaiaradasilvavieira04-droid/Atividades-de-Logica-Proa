<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 3</title>
</head>
<body>
    <script>

   
    let saldo = parseFloat(prompt("Digite o saldo: "));

    let reajuste = saldo * 0.01;
    
    let novoSaldo = saldo + reajuste;
    document.write("Novo saldo com reajuste de 1%: "+ novoSaldo.toFixed(2))


    
    alert(
        "Seu saldo teve o reajuste de 1%: " + novoSaldo.toFixed(2)
    )

    </script>
    
</body>
</html>
