<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 5</title>
</head>
<body>
    <h1>Atividade 5</h1>

    <script>
        let n1 = parseInt(prompt("Digite o primeiro número:"));
        let n2 = parseInt(prompt("Digite o segundo número:"));

        let soma = 0;
        let contador = 0;

        for (let i = n1; i <= n2; i++) {
            soma = soma + i;
            contador = contador + 1;
        }

        let media = soma / contador;

        document.write("De " + n1 + " até " + n2 + "<br>");
        document.write("Média: " + media);
    </script>

</body>
</html>
