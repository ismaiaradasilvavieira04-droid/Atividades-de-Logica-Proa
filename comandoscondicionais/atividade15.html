<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 15</title>
</head>
<body>
    <h1>atividade 15</h1>
    <script>
        let soma = 0

        for
        (let i = 1; i <= 20; i++) {
            let idade= parseFloat(prompt("digite a idade da pessoa"))
            soma += idade 
        }
            document.write(" <br> a soma das idades é: " + soma)
        
     </script>
</body>
