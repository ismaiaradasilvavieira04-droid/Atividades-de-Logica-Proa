    <script>
       let primeiraMedia = (8 + 9 + 7) / 3

        let segundaMedia = (4 + 5 + 6) / 3

        let SomaDasMedia = primeiraMedia + segundaMedia
        let mediaDasMedias = (primeiraMedia + segundaMedia) / 2

        document.write("a media dos numeros da primeira media é : " + primeiraMedia)
        document.write(" <br> a media dos numeros da segunda media é : " + segundaMedia)
        document.write(" <br> a soma das medias é :" + SomaDasMedia)
        document.write(" <br> a media das medias é :" + mediaDasMedias)

    </script>
