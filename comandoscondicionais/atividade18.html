<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 18</title>
</head>
<body>
  
    <h1>Atividade 18</h1>

    <script>
        let menorIdade = 999;
        let pessoaMaisNova = "";

        for (let contador = 1; contador <= 10; contador++) {

            let nomePessoa = prompt("Nome da " + contador + "ª pessoa:");
            let idadePessoa = parseInt(prompt("Idade da " + contador + "ª pessoa:"));

            document.write("<br> Pessoa " + contador + ": " + nomePessoa + " - " + idadePessoa + " anos");

            if (idadePessoa < menorIdade) {
                menorIdade = idadePessoa;
                pessoaMaisNova = nomePessoa;
            }
        }

        document.write("<br><br>A pessoa mais nova é: " + pessoaMaisNova);
        document.write("<br> Idade: " + menorIdade + " anos");
    </script>

</body>
</html>
