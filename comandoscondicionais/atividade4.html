<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Atividade 4</title>
</head>

<body>
    <h1>Atividade 4 </h1>
    <script>
        let a = parseFloat(prompt("digite o valor de a:"))
        document.write(" <br> o valor de a é:" + a)

        let b = parseFloat(prompt("digite o valor de b:"))
        document.write(" <br> o valor de b é:" + b)

        let c = parseFloat(prompt("digite o valor de c:"))
        document.write(" <br> o valor de c é:" + c)

        let valores = [a, b, c]
        valores.sort((x, y) => y - x)

        document.write("<br> os valores em ordem decrescente são:" + valores)


    </script>

</body>

</html>
