<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2 </title>
</head>
<body>
    <h1>Atividade 2</h1>
    <script>
        let saldoMedio = parseFloat(prompt("digite seu saldo medio:"))
        document.write(" <br> seu saldo medio é:" + saldoMedio)
        let valorCredito = 0
        document.write("<br> seu valor de credito é:" + valorCredito)


        if (saldoMedio <= 500) {
            valorCredito = 0
            document.write("<br> seu valor de credito é:" + valorCredito)
        } else if (saldoMedio > 501 && saldoMedio <= 1000) {
            valorCredito = saldoMedio * 0.30
            document.write("<br> seu valor de credito é:" + valorCredito)
        } else if (saldoMedio > 1001 && saldoMedio <= 3000) {
            valorCredito = saldoMedio * 0.40
            document.write("<br> seu valor de credito é:" + valorCredito)
        } else if (saldoMedio > 3001) {
            valorCredito = saldoMedio * 0.50
            document.write("<br> seu valor de credito é:" + valorCredito)
        } else {
            alert("valor invalido")
            document.write("<br> valor invalido")
        }
    


    </script>
    
</body>
</html>
