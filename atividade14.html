<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 14</title>
</head>
<body>
    <h1>atividade 14</h1>
    <script>
        let soma = 0

        for(let i =1 ; i <= 10; i++){
            let numero = parseInt(prompt("digite um numero"))
            soma  += numero
        }
        document.write(" <br> a soma dos numeros é:" + soma)
    </script>
    
</body>
</html>
